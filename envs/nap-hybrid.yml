name: nap-hybrid
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pytorch=2.*
  - pytorch-cuda=12.1
  - torchvision
  - numpy
  - pandas
  - biopython
  - pip:
      # install from git: the pypi wheel ships a Python 3.8 .so that
      # breaks on Python 3.10; building from source produces the right ABI.
      - git+https://github.com/mxfold/mxfold2.git
